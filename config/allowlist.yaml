# Institution allowlist.
#
# Two tiers. Tier 1 = frontier corporate/research labs where almost every paper
# is high signal. Tier 2 = elite academic labs where we want senior-author work
# specifically (their grad students publish a LOT, much of it noise).
#
# Each entry has:
#   name:           canonical short name we use in feeds and logs
#   match:          list of substrings (case-insensitive) to match in OpenAlex
#                   institution.display_name or in raw affiliation strings.
#                   Matching is OR within the list.
#   country:        ISO alpha-2 (informational only; helps with disambiguation)
#
# Derived empirically from the citation-graph analysis at the repo root
# (the top-30 institutions by citation-slot reach + frontier startups that
# punch above their citation weight despite low publication volume).

tier_1_frontier_labs:
  - {name: "Google DeepMind",        match: ["google deepmind", "deepmind", "google brain", "google research", "google (united states)"], country: "US"}
  - {name: "OpenAI",                 match: ["openai"], country: "US"}
  - {name: "Anthropic",              match: ["anthropic"], country: "US"}
  - {name: "Meta FAIR",              match: ["meta ai", "meta fair", "facebook ai research", "facebook ai", "meta platforms"], country: "US"}
  - {name: "Microsoft Research",     match: ["microsoft research"], country: "US"}
  - {name: "NVIDIA Research",        match: ["nvidia research", "nvidia corporation", "nvidia (united states)"], country: "US"}
  - {name: "Apple ML Research",      match: ["apple ml", "apple inc", "apple (united states)"], country: "US"}
  - {name: "xAI",                    match: ["xai", "x.ai"], country: "US"}
  - {name: "Mistral AI",             match: ["mistral ai", "mistral"], country: "FR"}
  - {name: "DeepSeek",               match: ["deepseek"], country: "CN"}
