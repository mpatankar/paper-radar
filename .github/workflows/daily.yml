name: daily

on:
  schedule:
    # Runs every day at 04:00 UTC. arXiv usually finishes posting by ~02:00 UTC.
    - cron: "0 4 * * *"
  workflow_dispatch:        # allow manual triggering for debugging

permissions:
  contents: write           # need to push generated feeds to gh-pages

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: restore state from artifact (optional)
        uses: actions/cache@v4
        with:
          path: data
          # Per-day cache so SQLite caches survive across runs; bumping the
          # version part forces a clean rebuild.
          key: paper-radar-data-v1-${{ github.run_id }}
          restore-keys: |
            paper-radar-data-v1-

      - name: run pipeline
        run: paper-radar run
        env:
          PAPER_RADAR_CONFIG_DIR: config

      - name: show stats
        run: |
          echo "=== stats.json ==="
          cat feeds_out/stats.json | python -m json.tool

      - name: deploy feeds to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./feeds_out
          publish_branch: gh-pages
          commit_message: "daily: ${{ github.run_id }}"
