name: daily

on:
  schedule:
    # Runs every day at 04:00 UTC. arXiv usually finishes posting by ~02:00 UTC.
    - cron: "0 4 * * *"
  workflow_dispatch:        # allow manual triggering for debugging

permissions:
  contents: write           # need to push generated feeds to gh-pages

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # 120 minutes accommodates cold-cache runs. Subsequent runs finish in ~5-15 min
    # thanks to the SQLite cache. 429s with long Retry-After short-circuit
    # gracefully instead of sleeping.
    timeout-minutes: 120

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: restore state from artifact (optional)
        uses: actions/cache@v4
        with:
          # data/ holds the SQLite caches (author_cache + seen) and decisions log.
          # feeds_out/ holds yesterday's published RSS XML so write_feed can
          # accumulate items across runs instead of overwriting the file with
          # only this run's new papers.
          path: |
            data
            feeds_out
          # Per-day cache so SQLite caches survive across runs; bumping the
          # version part forces a clean rebuild.
          # v2 = post-fix for non-arxiv routing bug (Arc bio in robotics feed).
          # Bumping the version invalidates any prior cache, forcing a clean
          # rebuild so the polluted feeds get re-written from scratch.
          key: paper-radar-data-v2-${{ github.run_id }}
          restore-keys: |
            paper-radar-data-v2-

      - name: sync feeds from live gh-pages (source of truth)
        # The accumulator merges this run's new items with whatever's already
        # in feeds_out/. The cache restore handles the common case, but if
        # someone migrates feeds directly on gh-pages (e.g., pubDate re-stamp),
        # we want THAT version, not the cached one. So overwrite feeds_out
        # with the live versions. A 404 on a feed (e.g., first run ever) is
        # tolerated via `|| true`.
        run: |
          mkdir -p feeds_out
          for feed in frontier-llm alignment-safety vision-multimodal robotics-embodied ai-science everything; do
            curl -fsSL "https://mpatankar.github.io/paper-radar/${feed}.xml" -o "feeds_out/${feed}.xml" || true
          done
          ls -la feeds_out/

      - name: run pipeline
        run: paper-radar run
        env:
          PAPER_RADAR_CONFIG_DIR: config

      - name: show stats
        run: |
          echo "=== stats.json ==="
          cat feeds_out/stats.json | python -m json.tool

      - name: deploy feeds to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./feeds_out
          publish_branch: gh-pages
          commit_message: "daily: ${{ github.run_id }}"
